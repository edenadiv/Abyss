const TAROT_CARDS = [
  { id: 'sun',        numeral: 'XIX',   name: 'THE SUN',         color: '#f4c04e', accent: '#b59248', min:  50, max: Infinity, tier: 'big-win' },
  { id: 'magician',   numeral: 'I',     name: 'THE MAGICIAN',    color: '#ff6b8a', accent: '#8b1e2c', min:  50, max: Infinity, tier: 'big-win' },
  { id: 'wheel',      numeral: 'X',     name: 'WHEEL OF FORTUNE',color: '#7ef0ff', accent: '#3fb8cc', min:  50, max: Infinity, tier: 'big-win' },
  { id: 'empress',    numeral: 'III',   name: 'THE EMPRESS',     color: '#c7a6ff', accent: '#8b6fd6', min:   1, max:  49, tier: 'small-win' },
  { id: 'star',       numeral: 'XVII',  name: 'THE STAR',        color: '#5be0c2', accent: '#3a8e78', min:   1, max:  49, tier: 'small-win' },
  { id: 'temperance', numeral: 'XIV',   name: 'TEMPERANCE',      color: '#e8e2cc', accent: '#a39a7e', min:   0, max:   0, tier: 'push' },
  { id: 'moon',       numeral: 'XVIII', name: 'THE MOON',        color: '#8b6fd6', accent: '#442e78', min: -49, max:  -1, tier: 'small-loss' },
  { id: 'hanged',     numeral: 'XII',   name: 'THE HANGED MAN',  color: '#5a6a74', accent: '#2a3a44', min: -49, max:  -1, tier: 'small-loss' },
  { id: 'tower',      numeral: 'XVI',   name: 'THE TOWER',       color: '#c4455d', accent: '#8b1e2c', min: -Infinity, max: -50, tier: 'big-loss' },
  { id: 'death',      numeral: 'XIII',  name: 'DEATH',           color: '#e8e2cc', accent: '#0a1a24', min: -Infinity, max: -50, tier: 'big-loss' },
  { id: 'devil',      numeral: 'XV',    name: 'THE DEVIL',       color: '#8b1e2c', accent: '#2a0810', min: -Infinity, max: Infinity, tier: 'cursed' },
  { id: 'fool',       numeral: '0',     name: 'THE FOOL',        color: '#ffc07a', accent: '#8a5e20', min: -Infinity, max: Infinity, tier: 'special' },
];

function pickTarotCard(delta, cursed) {
  if (cursed && Math.random() < 0.5) return TAROT_CARDS.find(c => c.id === 'devil');
  const candidates = TAROT_CARDS.filter(c => delta >= c.min && delta <= c.max);
  if (!candidates.length) return TAROT_CARDS[5];
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function TarotCardCanvas({ card }) {
  const ref = useRef();
  useEffect(() => {
    const cnv = ref.current;
    if (!cnv) return;
    const w = cnv.width = 320, h = cnv.height = 520;
    const ctx = cnv.getContext('2d');
    ctx.clearRect(0, 0, w, h);

    // Card background — deep velvet
    const bg = ctx.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#1a0a18');
    bg.addColorStop(0.5, '#0a0612');
    bg.addColorStop(1, '#14081e');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // Gold double border
    ctx.strokeStyle = '#b59248';
    ctx.lineWidth = 3;
    ctx.strokeRect(10, 10, w - 20, h - 20);
    ctx.strokeStyle = '#d8b564';
    ctx.lineWidth = 1;
    ctx.strokeRect(20, 20, w - 40, h - 40);

    // Corner ornaments
    const corners = [[28,28],[w-28,28],[28,h-28],[w-28,h-28]];
    corners.forEach(([x,y]) => {
      ctx.strokeStyle = '#d8b564';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI*2);
      ctx.fill();
    });

    // Top: Roman numeral
    ctx.fillStyle = card.color;
    ctx.shadowColor = card.color;
    ctx.shadowBlur = 14;
    ctx.font = 'bold 28px "Cinzel", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(card.numeral, w/2, 52);
    ctx.shadowBlur = 0;

    // Thin divider lines
    ctx.strokeStyle = 'rgba(216, 181, 100, 0.5)';
    ctx.beginPath(); ctx.moveTo(50, 80); ctx.lineTo(w-50, 80); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(50, h-80); ctx.lineTo(w-50, h-80); ctx.stroke();

    // Central painted symbol
    ctx.save();
    ctx.translate(w/2, h/2 - 10);
    // Halo
    const halo = ctx.createRadialGradient(0, 0, 10, 0, 0, 140);
    halo.addColorStop(0, card.color);
    halo.addColorStop(0.3, card.color + '88');
    halo.addColorStop(1, 'transparent');
    ctx.fillStyle = halo;
    ctx.fillRect(-150, -150, 300, 300);

    const paintSymbol = (id) => {
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = card.color;
      ctx.fillStyle = card.color;
      ctx.shadowColor = card.color;
      ctx.shadowBlur = 20;
      if (id === 'sun') {
        // Radiating sun
        for (let i = 0; i < 16; i++) {
          const a = (i / 16) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a)*38, Math.sin(a)*38);
          ctx.lineTo(Math.cos(a)*78, Math.sin(a)*78);
          ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(0, 0, 36, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = card.accent;
        ctx.beginPath(); ctx.arc(-10, -4, 3, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(10, -4, 3, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 8, 8, 0, Math.PI); ctx.stroke();
      } else if (id === 'magician') {
        // Infinity lemniscate above staff
        ctx.lineWidth = 4;
        ctx.beginPath();
        for (let i = 0; i <= 60; i++) {
          const t = (i / 60) * Math.PI * 2;
          const x = 40 * Math.sin(t) / (1 + Math.cos(t) * Math.cos(t));
          const y = -40 + 40 * Math.sin(t) * Math.cos(t) / (1 + Math.cos(t) * Math.cos(t));
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        // Staff
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(0, 80); ctx.stroke();
      } else if (id === 'wheel') {
        // Wheel of fortune
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, 0, 70, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, 50, 0, Math.PI*2); ctx.stroke();
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a)*50, Math.sin(a)*50);
          ctx.lineTo(Math.cos(a)*70, Math.sin(a)*70);
          ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
      } else if (id === 'empress') {
        // Crown + roses
        ctx.beginPath();
        ctx.moveTo(-40, -10);
        ctx.lineTo(-28, -40); ctx.lineTo(-16, -18);
        ctx.lineTo(0, -46); ctx.lineTo(16, -18);
        ctx.lineTo(28, -40); ctx.lineTo(40, -10);
        ctx.closePath();
        ctx.fill();
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(-30 + i*30, 30, 10, 0, Math.PI*2);
          ctx.fill();
        }
      } else if (id === 'star') {
        // 8-point star with dots
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
          const rOuter = i % 2 === 0 ? 70 : 30;
          if (i === 0) ctx.beginPath();
          const x = Math.cos(a) * rOuter;
          const y = Math.sin(a) * rOuter;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
      } else if (id === 'temperance') {
        // Angel scales
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-40, 0); ctx.lineTo(40, 0); ctx.stroke();
        ctx.beginPath(); ctx.arc(-40, 20, 15, 0, Math.PI, true); ctx.stroke();
        ctx.beginPath(); ctx.arc(40, 20, 15, 0, Math.PI, true); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -50); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, -50, 10, 0, Math.PI*2); ctx.fill();
      } else if (id === 'moon') {
        // Crescent moon with face
        ctx.beginPath();
        ctx.arc(0, 0, 60, Math.PI * 0.35, Math.PI * 1.65);
        ctx.arc(20, 0, 50, Math.PI * 1.5, Math.PI * 0.5, true);
        ctx.fill();
      } else if (id === 'hanged') {
        // Inverted figure
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-30, -60); ctx.lineTo(30, -60); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -60); ctx.lineTo(0, -20); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 16); ctx.lineTo(-16, 50); ctx.moveTo(0, 16); ctx.lineTo(16, 50); ctx.stroke();
      } else if (id === 'tower') {
        // Tower being struck by lightning
        ctx.beginPath();
        ctx.moveTo(-30, 60); ctx.lineTo(-30, -30);
        ctx.lineTo(-40, -40); ctx.lineTo(-20, -50); ctx.lineTo(0, -30);
        ctx.lineTo(20, -50); ctx.lineTo(40, -40); ctx.lineTo(30, -30);
        ctx.lineTo(30, 60);
        ctx.closePath();
        ctx.fill();
        // Lightning bolt
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(-10, -70); ctx.lineTo(-25, -20); ctx.lineTo(-5, -20);
        ctx.lineTo(-20, 40); ctx.lineTo(15, -10); ctx.lineTo(0, -10);
        ctx.lineTo(15, -70);
        ctx.closePath();
        ctx.fill();
      } else if (id === 'death') {
        // Skull
        ctx.beginPath();
        ctx.arc(0, -10, 45, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-15, -10, 8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(15, -10, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillRect(-3, 4, 6, 8);
        // Scythe below
        ctx.strokeStyle = card.color;
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-40, 60); ctx.lineTo(40, 40); ctx.stroke();
      } else if (id === 'devil') {
        // Horned head
        ctx.beginPath();
        ctx.moveTo(-30, -40); ctx.lineTo(-50, -70); ctx.lineTo(-15, -50);
        ctx.lineTo(0, -70); ctx.lineTo(15, -50); ctx.lineTo(50, -70); ctx.lineTo(30, -40);
        ctx.lineTo(45, 30); ctx.lineTo(-45, 30);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffee80';
        ctx.beginPath(); ctx.arc(-15, -10, 4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(15, -10, 4, 0, Math.PI*2); ctx.fill();
      } else { // fool
        // Figure stepping off cliff, dog
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, -30, 14, 0, Math.PI*2); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-15, -15); ctx.lineTo(15, -15);
        ctx.lineTo(10, 40); ctx.lineTo(-10, 40);
        ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(40, 50); ctx.lineTo(60, 45); ctx.lineTo(70, 55); ctx.lineTo(50, 60); ctx.closePath(); ctx.fill();
      }
      ctx.shadowBlur = 0;
    };
    paintSymbol(card.id);
    ctx.restore();

    // Bottom: name
    ctx.fillStyle = '#e8d4a4';
    ctx.shadowColor = card.color;
    ctx.shadowBlur = 10;
    ctx.font = 'bold 18px "Cinzel", serif';
    ctx.textAlign = 'center';
    ctx.fillText(card.name, w/2, h - 46);
  }, [card.id]);
  return <canvas ref={ref} className="tarot-card-canvas"/>;
}

function TarotReveal({ card, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 1600);
    return () => clearTimeout(t);
  }, [onDone]);
  if (!card) return null;
  return (
    <div className="tarot-reveal-backdrop">
      <div className="tarot-card">
        <TarotCardCanvas card={card}/>
      </div>
    </div>
  );
}

<script type="text/plain" data-babel="world.jsx">
/* ================== 3D WORLD REACT WRAPPER ================== */

function WorldHub({ breath, targetBreath, paused, onPickTable, onExit, onSiren, whisper,
                    collectedFragments, onFragment, onNPC, houseEdgeTier, mirrorUnlocked,
                    onMerchant, onCharmkeeper, onConfessor, onRoomChange, onLedger }) {
  const containerRef = useRef();
  const worldRef = useRef();
  const peekMode = typeof window !== 'undefined' && /[?&]peek=1/.test(window.location.search);
  const [prompt, setPrompt] = useState(null);
  const [locked, setLocked] = useState(false);
  const [doorLocked, setDoorLocked] = useState(false);
  const [escapeCinematic, setEscapeCinematic] = useState(false);

  // Track latest breath in a ref so the door handler always has the fresh value
  const breathRef = useRef(breath);
  useEffect(() => { breathRef.current = breath; }, [breath]);

  const [webglFailed, setWebglFailed] = useState(false);
  const [sirenDialog, setSirenDialog] = useState(false);
  const [fragmentToast, setFragmentToast] = useState(null);
  const [roomTransition, setRoomTransition] = useState(null);
  const [currentRoom, setCurrentRoom] = useState('casino');
  const audioRef = useRef();

  // Single audio engine, lives for the WorldHub lifetime
  useEffect(() => {
    if (typeof TrappedAudio === 'undefined') return;
    const a = new TrappedAudio();
    audioRef.current = a;
    window.__trappedAudio = a;
    return () => { a.stop(); audioRef.current = null; if (window.__trappedAudio === a) window.__trappedAudio = null; };
  }, []);

  // Siren proximity + panic ducking (audio + world shader)
  useEffect(() => {
    const panic = breath > 0 && breath < 50 ? 1 : 0;
    if (audioRef.current) audioRef.current.setPanic(panic);
    if (worldRef.current && worldRef.current.setPanic) worldRef.current.setPanic(panic);
  }, [breath]);

  useEffect(() => {
    if (!containerRef.current || typeof TrappedWorld === 'undefined') return;
    let w;
    try {
      w = new TrappedWorld(containerRef.current, { collectedFragments: collectedFragments || [] });
    } catch (err) {
      console.error('[World] Failed to initialize WebGL/Three.js:', err);
      setWebglFailed(true);
      return;
    }
    worldRef.current = w;
    window.__trappedWorld = w;
    w.on('interact', (k) => {
      if (audioRef.current) audioRef.current.playChipStack();
      onPickTable(k);
    });
    w.on('exit', () => {
      if (breathRef.current < targetBreath) {
        setDoorLocked(true);
        setTimeout(() => setDoorLocked(false), 2400);
        return;
      }
      // Cinematic fade, then transition
      if (audioRef.current) audioRef.current.playDoorOpen();
      setEscapeCinematic(true);
      setTimeout(() => {
        setEscapeCinematic(false);
        onExit();
      }, 2100);
    });
    w.on('siren', () => {
      // Release pointer lock so the player can click the dialog choices
      if (w.controls && w.controls.isLocked) w.controls.unlock();
      if (audioRef.current) audioRef.current.setSirenProximity(1);
      setSirenDialog(true);
    });
    w.on('lock', () => {
      setLocked(true);
      if (audioRef.current) audioRef.current.start();
    });
    w.on('unlock', () => { setLocked(false); });
    let lastPromptId = null;
    let whisperTimer = null;
    w.on('prompt', (p) => {
      if (p && p.kind === 'exit' && breathRef.current < targetBreath) {
        setPrompt({
          ...p,
          subtitle: `Sealed · need ${targetBreath - breathRef.current} more breath`,
        });
      } else {
        setPrompt(p);
      }
      // Siren proximity audio
      if (audioRef.current) {
        audioRef.current.setSirenProximity(p && p.kind === 'siren' ? 1 : 0);

        // NPC whisper triggers — when we newly approach a character
        const currentId = p ? (p.kind === 'npc' ? (p.name || 'npc') : p.kind) : null;
        if (currentId !== lastPromptId) {
          lastPromptId = currentId;
          if (whisperTimer) clearTimeout(whisperTimer);
          if (p && (p.kind === 'npc' || p.kind === 'siren')) {
            // Play a single soft whisper once they enter range
            audioRef.current.playWhisper();
            // Queue occasional follow-ups while still in range
            whisperTimer = setInterval(() => {
              if (audioRef.current && lastPromptId === currentId) audioRef.current.playWhisper();
            }, 2800 + Math.random() * 1800);
          }
        }
      }
    });
    w.on('fragment', (id) => {
      if (onFragment) onFragment(id);
      setFragmentToast(id);
      if (audioRef.current) audioRef.current.playFragmentPickup();
      setTimeout(() => setFragmentToast(null), 3400);
    });
    w.on('npc', (id) => {
      if (w.controls && w.controls.isLocked) w.controls.unlock();
      if (onNPC) onNPC(id);
    });
    w.on('merchant', () => {
      if (w.controls && w.controls.isLocked) w.controls.unlock();
      if (audioRef.current && audioRef.current.playShopBell) audioRef.current.playShopBell();
      if (onMerchant) onMerchant();
    });
    w.on('charmkeeper', () => {
      if (w.controls && w.controls.isLocked) w.controls.unlock();
      if (audioRef.current && audioRef.current.playShopBell) audioRef.current.playShopBell();
      if (onCharmkeeper) onCharmkeeper();
    });
    w.on('confessor', () => {
      if (w.controls && w.controls.isLocked) w.controls.unlock();
      if (audioRef.current && audioRef.current.playWhisper) audioRef.current.playWhisper();
      if (onConfessor) onConfessor();
    });
    w.on('portal', (targetRoom) => {
      // Cinematic transition
      setRoomTransition(targetRoom);
      setTimeout(() => {
        if (w && !w.disposed) w.buildRoom(targetRoom);
      }, 450);
      setTimeout(() => setRoomTransition(null), 900);
    });
    w.on('room', (name) => {
      setCurrentRoom(name);
      if (onRoomChange) onRoomChange(name);
    });
    w.on('ledger', () => {
      if (w.controls && w.controls.isLocked) w.controls.unlock();
      if (onLedger) onLedger();
    });

    return () => {
      w.dispose();
      worldRef.current = null;
      if (window.__trappedWorld === w) window.__trappedWorld = null;
    };
  }, []);

  useEffect(() => {
    if (!worldRef.current) return;
    worldRef.current.setPaused(!!paused);
    // Duck audio while a game modal is open
    if (audioRef.current && audioRef.current.started && audioRef.current.nodes.master) {
      const ctx = audioRef.current.ctx;
      audioRef.current.nodes.master.gain.cancelScheduledValues(ctx.currentTime);
      audioRef.current.nodes.master.gain.linearRampToValueAtTime(paused ? 0.25 : 0.6, ctx.currentTime + 0.4);
    }
  }, [paused]);

  // Sync collected fragments into the world (hide already-picked-up meshes)
  useEffect(() => {
    if (worldRef.current) worldRef.current.setCollectedFragments(collectedFragments || []);
  }, [collectedFragments && collectedFragments.length]);

  // Sync house-edge tier visual state
  useEffect(() => {
    if (worldRef.current && houseEdgeTier) worldRef.current.setEdgeTier(houseEdgeTier);
  }, [houseEdgeTier]);

  // Reveal Mirror when unlocked
  useEffect(() => {
    if (worldRef.current && mirrorUnlocked) worldRef.current.revealMirror();
  }, [mirrorUnlocked]);

  const showEntry = !peekMode && !locked && !paused && !sirenDialog && !webglFailed && !escapeCinematic;

  const onClickEntry = () => {
    if (worldRef.current) worldRef.current.requestLock();
  };

  if (webglFailed) {
    return (
      <div className="world-hub">
        <div className="world-fallback">
          <Hub
            breath={breath}
            targetBreath={targetBreath}
            whisper={whisper}
            onPick={onPickTable}
            onExit={onExit}
            onQuit={onSiren}
          />

      </div>

  }

  return (
    <div className="world-hub">
      <div ref={containerRef} className="world-canvas-container"/>

      {locked && <div className={`world-crosshair ${prompt ? 'active' : ''}`}/>}

      {locked && prompt && (

          <span className="world-interact-key">E</span>
          <span className="world-interact-name">{prompt.name}</span>
          {prompt.subtitle && <span className="world-interact-sub">{prompt.subtitle}</span>}

      )}

      {showEntry && (
        <div className="world-entry" onClick={onClickEntry}>
          <div className="world-entry-card">
            <div className="world-entry-title">The Casino Floor</div>
            <div className="world-entry-headline">
              Seven tables. One door. Your breath in every seat.
            </div>
            <div className="world-entry-controls">
              <kbd>W A S D</kbd><span>move through the chamber</span>
              <kbd>Mouse</kbd><span>look around</span>
              <kbd>Shift</kbd><span>swim faster</span>
              <kbd>E</kbd><span>approach a table, sit, or exit</span>
              <kbd>Esc</kbd><span>release the mouse</span>

      {sirenDialog && (

        />

      {doorLocked && (

        </div>
      )}

      {fragmentToast && (() => {
        const f = FRAGMENTS.find(x => x.id === fragmentToast);
        if (!f) return null;
        return (
          <div className="fragment-toast">

            <div className="fragment-toast-title">{f.title}</div>
            <div className="fragment-toast-line">{f.line}</div>
          </div>
        );
      })()}

      {escapeCinematic && <div className="world-escape-cinematic"/>}

      {roomTransition && (
        <>
          <div className="room-transition"/>
          <div className="room-banner">

      {locked && (
        <div className="world-compass">
          — W A S D · MOVE &nbsp;·&nbsp; E · INTERACT &nbsp;·&nbsp; ESC · RELEASE —
        </div>

      <SirenWhisper text={whisper}/>

    </div>
  );
}

/* Pre-ending Siren dialog — she speaks before you commit to staying.
   Different tone depending on current breath:
     - low breath (<100)  : pity, seductive urgency
     - mid breath         : tempting, languid
     - high breath (>=400): congratulatory, coaxing toward the Mirror */
function SirenEncounter({ onSit, onWalkAway, breath, gamesPlayed, houseEdgeTier }) {
  const [stage, setStage] = useState(0);

  const pools = {
    low: [
      "Hello again, little lung. You're breathing so shallow I can hear you three tables over.",
      "The door is that way. Five hundred breaths. A long, long walk for someone so soft.",
      "Or. You could sit with me. Breathe out. The water does the rest. No more counting.",
      "I will be gentle. I am always gentle with the ones who listen.",
    ],
    mid: [
      "Close enough that I could count the bubbles on your lip. You smell like a Thursday.",
      "You've been playing a while. I like that in a drowning thing.",
      "You could leave. Pay your five hundred. Walk. Or you could sit, and I would be kind.",
      "Stay. The song is better when you stop fighting it.",
    ],
    high: [
      "Oh, you've done well. Unusually well. The felt is very proud of you.",
      "You're almost rich enough to buy a second lifetime. Almost.",
      "But it is heavy, isn't it. The winning. It has a weight to it that losing never does.",
      "Sit. I will take it off your hands. You can be empty again — and that, little lung, is the only real way to leave.",
    ],
    cruel: [
      "The house has been cruel to you. Good. It means you are interesting.",
      "Some of them sit down at the tables already drowned, you know. You have not.",
      "Pay the door if you can. Or sit. Sit and I will make the house apologize.",
    ],
  };

  // Choose tone based on current state
  let pool = pools.mid;
  if (houseEdgeTier === 'cruel') pool = pools.cruel;
  else if (breath < 100) pool = pools.low;
  else if (breath >= 400) pool = pools.high;

  const lines = pool;

  useEffect(() => {
    const esc = (e) => {
      if (e.key === 'Escape') onWalkAway();
      if (e.key === 'Enter' || e.key === ' ') {
        if (stage < lines.length - 1) setStage(stage + 1);
      }
    };
    window.addEventListener('keydown', esc);
    return () => window.removeEventListener('keydown', esc);
  }, [stage]);

  return (
    <div className="siren-encounter-backdrop">
      <div className="siren-encounter">
        <div className="siren-encounter-name">THE SIREN</div>
        <div className="siren-encounter-text">
          {lines[stage]}
          <span className="caret"/>
        </div>
        {stage < lines.length - 1 ? (
          <button className="btn btn-siren btn-sm mt-2" onClick={() => setStage(stage + 1)}>
            Continue
          </button>
        ) : (
          <div className="siren-encounter-choices">
            <button className="btn btn-ghost btn-sm" onClick={onWalkAway}>
              Walk back to the floor
            </button>
            <button className="btn btn-siren btn-sm" onClick={onSit}>
              Sit with her · End breath
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function MiniMap({ worldRef }) {
  const canvasRef = useRef();

  useEffect(() => {
    let raf = 0;
    const draw = () => {
      const cnv = canvasRef.current;
      if (!cnv) return;
      const ctx = cnv.getContext('2d');
      const size = cnv.width = cnv.height = 160;
      ctx.clearRect(0, 0, size, size);

      // Background
      ctx.fillStyle = 'rgba(5,16,28,0.4)';
      ctx.fillRect(0, 0, size, size);

      const w = worldRef.current;
      const scale = size / 50; // 50 units visible
      const cx = size / 2, cy = size / 2;

      // Chamber outline
      ctx.strokeStyle = 'rgba(126,240,255,0.35)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(cx, cy, 22 * scale, 0, Math.PI * 2);
      ctx.stroke();

      if (w && w.tables) {
        // Tables as dots
        w.tables.forEach(t => {
          ctx.fillStyle = 'rgba(126,240,255,0.85)';
          ctx.shadowColor = '#7ef0ff';
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.arc(cx + t.position.x * scale, cy + t.position.z * scale, 2.5, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.shadowBlur = 0;

        // Door
        if (w.door) {
          ctx.fillStyle = 'rgba(126,240,255,1)';
          ctx.beginPath();
          ctx.rect(cx + w.door.position.x * scale - 4, cy + w.door.position.z * scale - 1.5, 8, 3);
          ctx.fill();
        }

        // Siren
        if (w.sirenAltar) {
          ctx.fillStyle = 'rgba(199,166,255,0.95)';
          ctx.shadowColor = '#c7a6ff';
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(cx + w.sirenAltar.position.x * scale, cy + w.sirenAltar.position.z * scale, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        // Player position + facing
        if (w.controls) {
          const p = w.controls.getObject().position;
          const dir = new THREE.Vector3();
          w.camera.getWorldDirection(dir);
          const px = cx + p.x * scale;
          const py = cy + p.z * scale;
          // Facing triangle
          ctx.save();
          ctx.translate(px, py);
          ctx.rotate(Math.atan2(dir.x, dir.z));
          ctx.fillStyle = 'rgba(232,226,204,0.95)';
          ctx.beginPath();
          ctx.moveTo(0, -6);
          ctx.lineTo(-4, 4);
          ctx.lineTo(4, 4);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(raf);
  }, []);

  return (
    <div className="world-map">
      <div className="world-map-label">The Abyss</div>
      <canvas ref={canvasRef} className="world-map-canvas"/>
    </div>
  );
}

    'Glyphs':      'https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/KLIMT_-_Dan%C3%A1e_%281907-1908%29.jpg/1024px-KLIMT_-_Dan%C3%A1e_%281907-1908%29.jpg',
    'Ghost Poker': 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Michelangelo_Merisi%2C_called_Caravaggio_-_The_Cardsharps_-_Google_Art_Project.jpg/1024px-Michelangelo_Merisi%2C_called_Caravaggio_-_The_Cardsharps_-_Google_Art_Project.jpg',
    'Bones':       'https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Edward_Burne-Jones_-_The_Depths_of_the_Sea_%281887%29.jpg/1024px-Edward_Burne-Jones_-_The_Depths_of_the_Sea_%281887%29.jpg',
    'The Coin':    'https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/A_Mermaid.jpg/1024px-A_Mermaid.jpg',

  return (

      )}

      {/* Marquee header bar — flickering bulbs + title */}
      <div className="game-marquee-header">
        <div className="game-marquee-bulbs"/>
        <div className="game-marquee-title">{(title || 'Table').toUpperCase()}</div>
        <div className="game-marquee-bulbs"/>
      </div>

      {/* Gilt frame decoration */}
      <div className="game-gilt-frame"/>

      {/* Red velvet curtains sweeping open — pure CSS animation */}
      <div className="game-curtain game-curtain-left"/>
      <div className="game-curtain game-curtain-right"/>

      <button className="game-modal-close" onClick={onClose}>← LEAVE THE TABLE</button>
      <div className="game-modal-content">
        {children}
      </div>

  );
}

Object.assign(window, { WorldHub, MiniMap, GameModal });

<!-- === app.jsx === -->
<script type="text/plain" data-babel="app.jsx">
/* ================== MAIN APP ================== */

function App() {
  const [scene, setScene] = useState('intro'); // intro | ghostIntro | hub | spectator | game:X | ending:Y
  const [breath, setBreath] = useState(TWEAK_DEFAULTS.startingBreath);
  const [gamesPlayed, setGamesPlayed] = useState(0);
  const [settings, setSettings] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [whisper, setWhisper] = useState(null);
  const [editModeActive, setEditModeActive] = useState(false);

  // Mythology layer
  const { collected: fragments, collect: collectFragment, clear: clearFragments, setCollected: setFragments } = useFragments();
  const { owned: trinkets, buy: buyTrinketRaw, consume: consumeTrinket, has: hasTrinket, clear: clearTrinkets, setOwned: setTrinkets } = useTrinkets();
  const [meta, setMeta] = useState(loadMeta);
  const [activeNpc, setActiveNpc] = useState(null);   // gambler | muse | mirror | null
  const [fragmentReader, setFragmentReader] = useState(null);
  const [galleryOpen, setGalleryOpen] = useState(false);
  const [mirrorUnlocked, setMirrorUnlocked] = useState(false);
  const [maxBreathSeen, setMaxBreathSeen] = useState(0);
  const [deathNoticed, setDeathNoticed] = useState(false);
  const [prevEdgeTier, setPrevEdgeTier] = useState(null);
  const [shopOpen, setShopOpen] = useState(() => /[?&]shop=1/.test(window.location.search));
  const [charmOpen, setCharmOpen] = useState(() => /[?&]charm=1/.test(window.location.search));
  const [confessorOpen, setConfessorOpen] = useState(() => /[?&]confessor=1/.test(window.location.search));
  const [atThreshold, setAtThreshold] = useState(() => /[?&]threshold=1/.test(window.location.search));
  const [lockedIn, setLockedIn] = useState(false);
  const [tarotCard, setTarotCard] = useState(null);
  const [ledgerOpen, setLedgerOpen] = useState(() => /[?&]ledger=1/.test(window.location.search));
  const runIdxRef = useRef(null);
  // Compute runIdx lazily on first need (loaded from meta.totalRuns)
  const getRunIdx = () => {
    if (runIdxRef.current == null) runIdxRef.current = Math.max(1, (loadMeta().totalRuns || 0) + 1);
    return runIdxRef.current;
  };
  const [revelationForeclosed, setRevelationForeclosed] = useState(false);
  const [worldRoom, setWorldRoom] = useState('casino');
  const cursedIntervalRef = useRef(null);

  const TARGET_BREATH = 500;

  // Load persisted state (position + fragments + trinkets)
  useEffect(() => {
    try {
      const saved = JSON.parse(sessionStorage.getItem('atlantis_state') || '{}');
      if (saved.scene) setScene(saved.scene);
      if (typeof saved.breath === 'number') setBreath(saved.breath);
      if (typeof saved.gamesPlayed === 'number') setGamesPlayed(saved.gamesPlayed);
      if (saved.settings) setSettings(s => ({ ...s, ...saved.settings }));
      if (Array.isArray(saved.fragments)) setFragments(saved.fragments);
      if (Array.isArray(saved.trinkets)) setTrinkets(saved.trinkets);
      if (typeof saved.mirrorUnlocked === 'boolean') setMirrorUnlocked(saved.mirrorUnlocked);
      if (typeof saved.revelationForeclosed === 'boolean') setRevelationForeclosed(saved.revelationForeclosed);
      if (typeof saved.lockedIn === 'boolean') setLockedIn(saved.lockedIn);
    } catch(e) {}
  }, []);

  useEffect(() => {
    sessionStorage.setItem('atlantis_state', JSON.stringify({
      scene, breath, gamesPlayed, settings, fragments, trinkets, mirrorUnlocked, revelationForeclosed, lockedIn,
    }));
  }, [scene, breath, gamesPlayed, settings, fragments, trinkets, mirrorUnlocked, revelationForeclosed, lockedIn]);

  // Cursed trinket — drip breath while it has charges
  useEffect(() => {
    const cursed = trinkets.find(t => t.id === 'drowning-chain' && t.charges > 0);
    if (cursed && !cursedIntervalRef.current) {
      cursedIntervalRef.current = setInterval(() => {
        setBreath(b => Math.max(0, b - 1));
        consumeTrinket('drowning-chain', 1);
      }, 1000);
    } else if (!cursed && cursedIntervalRef.current) {
      clearInterval(cursedIntervalRef.current);
      cursedIntervalRef.current = null;
    }
    return () => {
      if (cursedIntervalRef.current) { clearInterval(cursedIntervalRef.current); cursedIntervalRef.current = null; }
    };
  }, [trinkets]);

  // Expose trinkets globally so game components can peek (simple read-through)
  useEffect(() => {
    window.__trinkets = {
      has: (id) => trinkets.some(t => t.id === id && t.charges > 0),
      consume: (id, n = 1) => consumeTrinket(id, n),
      state: trinkets,
    };
  }, [trinkets]);

  // Edit mode protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') { setEditModeActive(true); setTweaksVisible(true); }
      if (e.data?.type === '__deactivate_edit_mode') { setEditModeActive(false); setTweaksVisible(false); }
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Persist tweaks back to file
  useEffect(() => {
    if (editModeActive) {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: settings }, '*');
    }
  }, [settings, editModeActive]);

  // Depth visual
  const depthNum = settings.waterDepth === 'shallow' ? 1242
                 : settings.waterDepth === 'abyss' ? 8812 : 3842;

  // Effective house edge (rises with gamesPlayed) — softened if Kraken Tooth is active
  const rawTier = effectiveHouseEdge(settings.houseEdge, gamesPlayed);
  const tierOrder = ['easy','normal','hard','rigged','cruel'];
  let softened = hasTrinket('kraken-tooth')
    ? tierOrder[Math.max(0, tierOrder.indexOf(rawTier) - 1)]
    : rawTier;
  // Locked-in mode — the Siren treats you kindly now that you chose to stay.
  if (lockedIn) softened = tierOrder[Math.max(0, tierOrder.indexOf(softened) - 1)];
  const houseEdgeTier = softened;

  // Toll bell + update meta when the edge tier tightens
  useEffect(() => {
    if (prevEdgeTier && prevEdgeTier !== houseEdgeTier) {
      // Bell audio cue — only a subtle tightening
      const audio = window.__trappedAudio;
      if (audio && audio.playBellToll) audio.playBellToll();
    }
    setPrevEdgeTier(houseEdgeTier);
  }, [houseEdgeTier]);

  // Track max breath for Mirror ending unlock
  useEffect(() => {
    setMaxBreathSeen(m => Math.max(m, breath));
    if (breath >= 1000 && !mirrorUnlocked) {
      setMirrorUnlocked(true);
      setMirrorAnnouncement(true);
      setTimeout(() => setMirrorAnnouncement(false), 5200);
      const audio = window.__trappedAudio;
      if (audio && audio.playMirrorReveal) audio.playMirrorReveal();
    }
    // If already over 1200 and has visited Mirror — auto ending
    if (breath >= 1200 && mirrorUnlocked && scene === 'hub') {
      setTimeout(() => setScene('ending:mirror'), 900);
    }
  }, [breath, mirrorUnlocked, scene]);

  const [mirrorAnnouncement, setMirrorAnnouncement] = useState(false);
  const [revelationCinematic, setRevelationCinematic] = useState(false);
  const [creditsOpen, setCreditsOpen] = useState(false);

  // Auto-show credits when the sixth unique ending is reached
  useEffect(() => {
    const reached = new Set(meta.endingsReached || []);
    if ((meta.deaths || 0) > 0) reached.add('ghost');
    if (reached.size >= 8 && !meta.creditsSeen) {
      setTimeout(() => {
        setCreditsOpen(true);
        setMeta(m => {
          const next = { ...m, creditsSeen: true };
          saveMeta(next);
          return next;
        });
      }, 1400);
    }
  }, [meta]);

  // Handle bet result
  const handleResult = (delta) => {
    // Trinket modifiers on outcome
    let adjusted = delta;
    if (delta > 0 && hasTrinket('lucky-kiss')) {
      adjusted = Math.round(delta * 1.25);
      consumeTrinket('lucky-kiss', 1);
    }
    if (delta > 0 && hasTrinket('drowning-chain')) {
      adjusted = Math.round(adjusted * 1.5);
    }
    if (hasTrinket('kraken-tooth')) {
      consumeTrinket('kraken-tooth', 1);
    }
    // Locked-in: payouts doubled (you stayed, the house is grateful)
    if (lockedIn && adjusted > 0) adjusted = adjusted * 2;
    setBreath(b => Math.max(0, b + adjusted));
    setGamesPlayed(g => g + 1);
    // Ghost players react
    if (window.__trappedWorld && window.__trappedWorld.markLastResult) window.__trappedWorld.markLastResult(adjusted);
    const audio = window.__trappedAudio;
    // Tarot card reveal
    const cursedActive = hasTrinket('drowning-chain');
    const card = pickTarotCard(adjusted, cursedActive);
    if (card) {
      setTarotCard(card);
      if (audio && card.tier === 'big-loss' && audio.playBellToll) audio.playBellToll();
      else if (audio && card.tier === 'big-win' && audio.playMirrorReveal) audio.playMirrorReveal();
    }
    // Ledger: record this hand.
    const game = scene.startsWith('game:') ? scene.split(':')[1] : 'table';
    appendLedger({
      runIdx: getRunIdx(),
      kind: 'hand',
      text: game,
      delta: adjusted,
    });
    setMeta(m => {
      const next = { ...m, handsPlayedEver: m.handsPlayedEver + 1, breathsSurrendered: m.breathsSurrendered + Math.max(0, -delta) };
      saveMeta(next);
      return next;
    });
    // Drive music mood by the win / loss
    if (audio && audio.setMood) {
      audio.setMood(delta > 30 ? 'bright' : delta < -30 ? 'dark' : 'neutral');
      setTimeout(() => audio.setMood && audio.setMood('neutral'), 8000);
    }
    // Whisper occasionally
    if (Math.random() < 0.4) {
      const newBreath = Math.max(0, breath + delta);
      if (newBreath < 50) setWhisper(pickLine('low_breath', settings.dialogueStyle));
      else if (newBreath > 400) setWhisper(pickLine('high_breath', settings.dialogueStyle));
      else if (delta > 0) setWhisper(pickLine('win', settings.dialogueStyle));
      else setWhisper(pickLine('loss', settings.dialogueStyle));
      setTimeout(() => setWhisper(null), 6000);
    }
  };

  // Handle fragment pickup
  const handleFragmentPickup = (id) => {
    collectFragment(id);
    setMeta(m => {
      const ever = Array.from(new Set([...(m.fragmentsEverFound || []), id]));
      const next = { ...m, fragmentsEverFound: ever };
      saveMeta(next);
      return next;
    });
    const f = FRAGMENTS.find(x => x.id === id);
    appendLedger({ runIdx: getRunIdx(), kind: 'fragment', text: f ? f.title : id });
  };

  // Buy a trinket
  const handleBuyTrinket = (id, cost) => {
    if (breath < cost) return;
    setBreath(b => b - cost);
    buyTrinketRaw(id);
    const audio = window.__trappedAudio;
    if (audio && audio.playPurchase) audio.playPurchase();
    const t = TRINKETS.find(x => x.id === id);
    appendLedger({ runIdx: getRunIdx(), kind: 'buy', text: t ? t.name : id, delta: -cost });
  };

  // Sell a fragment (forecloses Revelation ending)
  const handleSellFragment = (id, price) => {
    setFragments(prev => prev.filter(x => x !== id));
    setBreath(b => b + price);
    setRevelationForeclosed(true);
    const audio = window.__trappedAudio;
    if (audio && audio.playFragmentSell) audio.playFragmentSell();
    const f = FRAGMENTS.find(x => x.id === id);
    appendLedger({ runIdx: getRunIdx(), kind: 'sell', text: f ? f.title : id, delta: price });
  };

  // Detect death — transition to ending:drown, increment meta, mark dead
  useEffect(() => {
    if (breath <= 0 && scene.startsWith('game:')) {
      setTimeout(() => {
        if (!deathNoticed) {
          setDeathNoticed(true);
          setMeta(m => {
            const next = {
              ...m,
              deaths: m.deaths + 1,
              lastDeathAt: Date.now(),
              maxBreathEver: Math.max(m.maxBreathEver, maxBreathSeen),
            };
            saveMeta(next);
            return next;
          });
          const audio = window.__trappedAudio;
          if (audio && audio.playFlatline) audio.playFlatline();
          appendLedger({ runIdx: getRunIdx(), kind: 'death', text: 'breath gone' });
        }
        setScene('ending:drown');
      }, 1500);
    } else if (breath <= 0 && scene === 'hub') {
      if (!deathNoticed) {
        setDeathNoticed(true);
        setMeta(m => {
          const next = {
            ...m,
            deaths: m.deaths + 1,
            lastDeathAt: Date.now(),
            maxBreathEver: Math.max(m.maxBreathEver, maxBreathSeen),
          };
          saveMeta(next);
          return next;
        });
      }
      setScene('ending:drown');
    }
  }, [breath, scene]);

  const [endingDiscovered, setEndingDiscovered] = useState(null);

  // Mark endings seen in meta
  useEffect(() => {
    if (scene.startsWith('ending:')) {
      const kind = scene.split(':')[1];
      appendLedger({ runIdx: getRunIdx(), kind: 'ending', text: kind });
      setMeta(m => {
        const alreadyHad = (m.endingsReached || []).includes(kind);
        const reached = Array.from(new Set([...(m.endingsReached || []), kind]));
        const next = { ...m, endingsReached: reached };
        if (kind === 'revelation') next.hasSeenRevelation = true;
        if (kind === 'mirror')     next.hasSeenMirror = true;
        saveMeta(next);
        // Celebrate first-time discoveries
        if (!alreadyHad) {
          setEndingDiscovered(kind);
          setTimeout(() => setEndingDiscovered(null), 4200);
        }
        return next;
      });
    }
  }, [scene]);

  // New-run function: wipe run state, keep meta
  const beginNewRun = () => {
    setBreath(settings.startingBreath);
    setGamesPlayed(0);
    setWhisper(null);
    clearFragments();
    clearTrinkets();
    setMirrorUnlocked(false);
    setRevelationForeclosed(false);
    setLockedIn(false);
    setMaxBreathSeen(0);
    setActiveNpc(null);
    setFragmentReader(null);
    setDeathNoticed(false);
    setMeta(m => {
      const next = { ...m, totalRuns: m.totalRuns + 1 };
      saveMeta(next);
      runIdxRef.current = next.totalRuns;
      return next;
    });
    appendLedger({ runIdx: runIdxRef.current || 1, kind: 'run', text: 'descent begins' });
    setScene('hub');
  };

  const restart = () => {
    // If the last result was death, land on ghost intro (unless they've never died)
    if (meta.deaths > 0) {
      setBreath(settings.startingBreath);
      setGamesPlayed(0);
      setWhisper(null);
      setDeathNoticed(false);
      setScene('ghostIntro');
    } else {
      setScene('intro');
      setBreath(settings.startingBreath);
      setGamesPlayed(0);
      setWhisper(null);
      setDeathNoticed(false);
    }
  };

  // Reset-from-intro: ensure breath matches current starting value
  useEffect(() => {
    if (scene === 'intro') setBreath(settings.startingBreath);
  }, [scene === 'intro' ? settings.startingBreath : null]);

  const lowBreath = breath > 0 && breath < 50;
  const inWorld = scene === 'hub' || scene.startsWith('game:');
  const inGameModal = scene.startsWith('game:');
  const allFragmentsFound = fragments.length >= 12;

  return (
    <>
      {/* Subtle water backdrop — dimmed when the 3D world is live */}
      <div className={inWorld ? 'world-active' : ''} style={{position: 'fixed', inset: 0, zIndex: 0}}>
        <WaterBackground/>
      </div>

      {/* ========== 3D walkable casino — stays mounted during game modals ========== */}
      {inWorld && (
        <WorldHub
          breath={breath}
          targetBreath={TARGET_BREATH}
          whisper={whisper}
          paused={inGameModal || !!activeNpc || shopOpen || charmOpen}
          collectedFragments={fragments}
          houseEdgeTier={houseEdgeTier}
          mirrorUnlocked={mirrorUnlocked}
          onPickTable={(key) => setScene('game:' + key)}
          onExit={() => {
            if (lockedIn) return; // door is sealed — this shouldn't even fire
            // Present the Threshold first. Breath is NOT yet deducted — only spent if they step through.
            setAtThreshold(true);
          }}
          onSiren={() => setScene('ending:house')}
          onFragment={handleFragmentPickup}
          onNPC={(id) => setActiveNpc(id)}
          onMerchant={() => setShopOpen(true)}
          onCharmkeeper={() => setCharmOpen(true)}
          onConfessor={() => setConfessorOpen(true)}
          onRoomChange={(name) => {
            setWorldRoom(name);
            appendLedger({ runIdx: getRunIdx(), kind: 'portal', text: name });
          }}
          onLedger={() => setLedgerOpen(true)}
        />
      )}

      {inWorld && trinkets && trinkets.length > 0 && (
        <TrinketBar owned={trinkets} onPick={() => {}}/>
      )}

      {shopOpen && (
        <ShopModal
          breath={breath}
          owned={trinkets}
          fragments={fragments}
          foreclosed={revelationForeclosed}
          playerName={meta && meta.playerName}
          onBuyTrinket={handleBuyTrinket}
          onSellFragment={handleSellFragment}
          onClose={() => setShopOpen(false)}
        />
      )}

      {atThreshold && (
        <Threshold
          breath={breath}
          gamesPlayed={gamesPlayed}
          fragments={fragments}
          revelationForeclosed={revelationForeclosed}
          onStepThrough={() => {
            setAtThreshold(false);
            setBreath(b => Math.max(0, b - TARGET_BREATH));
            appendLedger({ runIdx: getRunIdx(), kind: 'threshold', text: 'stepped through the door', delta: -TARGET_BREATH });
            if (allFragmentsFound && !revelationForeclosed) {
              const audio = window.__trappedAudio;
              if (audio && audio.playMirrorReveal) audio.playMirrorReveal();
              setRevelationCinematic(true);
              setTimeout(() => { setRevelationCinematic(false); setScene('ending:revelation'); }, 2400);
            } else {
              setScene('ending:escape');
            }
          }}
          onStayOneMore={() => {
            setAtThreshold(false);
            setLockedIn(true);
            const audio = window.__trappedAudio;
            if (audio && audio.playBellToll) audio.playBellToll();
            appendLedger({ runIdx: getRunIdx(), kind: 'threshold', text: 'stayed one more hand · door sealed' });
          }}
          onStayForever={() => {
            setAtThreshold(false);
            const audio = window.__trappedAudio;
            if (audio && audio.playMirrorReveal) audio.playMirrorReveal();
            appendLedger({ runIdx: getRunIdx(), kind: 'threshold', text: 'stayed forever' });
            setScene('ending:sovereign');
          }}
          onWalkAway={() => {
            setAtThreshold(false);
            appendLedger({ runIdx: getRunIdx(), kind: 'threshold', text: 'let the tide take you sideways' });
            setScene('ending:walkAway');
          }}
        />
      )}

      {lockedIn && inWorld && (
        <div className="locked-in-banner">YOU CHOSE TO STAY · THE DOOR WILL NOT OPEN AGAIN</div>
      )}

      {ledgerOpen && (
        <Ledger onClose={() => setLedgerOpen(false)}/>
      )}

      {tarotCard && (
        <TarotReveal card={tarotCard} onDone={() => setTarotCard(null)}/>
      )}

      {charmOpen && (
        <CharmOffer
          breath={breath}
          owned={trinkets}
          playerName={meta && meta.playerName}
          onBuyTrinket={(id, cost) => { handleBuyTrinket(id, cost); setCharmOpen(false); }}
          onClose={() => setCharmOpen(false)}
        />
      )}

      {confessorOpen && (
        <ConfessorModal
          breath={breath}
          fragments={fragments}
          playerName={meta && meta.playerName}
          onClose={() => setConfessorOpen(false)}
          onConfess={(id) => {
            setFragments(prev => prev.filter(x => x !== id));
            setBreath(b => b + 60);
            const f = FRAGMENTS.find(x => x.id === id);
            appendLedger({ runIdx: getRunIdx(), kind: 'confess', text: f ? f.title : id, delta: 60 });
            const audio = window.__trappedAudio;
            if (audio && audio.playWhisper) audio.playWhisper();
            setConfessorOpen(false);
          }}
          onBuyBackFragment={(id) => {
            if (breath < 20) return;
            setBreath(b => b - 20);
            collectFragment(id);
            setMeta(m => {
              const ever = Array.from(new Set([...(m.fragmentsEverFound || []), id]));
              const next = { ...m, fragmentsEverFound: ever };
              saveMeta(next);
              return next;
            });
            const f = FRAGMENTS.find(x => x.id === id);
            appendLedger({ runIdx: getRunIdx(), kind: 'confess', text: 'recalled · ' + (f ? f.title : id), delta: -20 });
            const audio = window.__trappedAudio;
            if (audio && audio.playFragmentPickup) audio.playFragmentPickup();
            setConfessorOpen(false);
          }}
        />
      )}

      {/* Fragment inventory bar — visible when in world */}
      {inWorld && fragments.length > 0 && (
        <FragmentInventory
          collected={fragments}
          onRead={(id) => setFragmentReader(id)}
          onOpen={() => setGalleryOpen(true)}
        />
      )}

      {/* ========== Game modals — float above the 3D world ========== */}
      {scene === 'game:blackjack' && (
        <GameModal title="Blackjack" onClose={() => setScene('hub')}>
          <Blackjack breath={breath} houseEdge={houseEdgeTier} dialogueStyle={settings.dialogueStyle}
            onResult={handleResult} onExit={() => setScene('hub')}/>
        </GameModal>
      )}
      {scene === 'game:roulette' && (
        <GameModal title="Omens Wheel" onClose={() => setScene('hub')}>
          <Roulette breath={breath} houseEdge={houseEdgeTier} dialogueStyle={settings.dialogueStyle}
            onResult={handleResult} onExit={() => setScene('hub')}/>
        </GameModal>
      )}
      {scene === 'game:slots' && (
        <GameModal title="Glyphs" onClose={() => setScene('hub')}>
          <Slots breath={breath} houseEdge={houseEdgeTier} dialogueStyle={settings.dialogueStyle}
            onResult={handleResult} onExit={() => setScene('hub')}/>
        </GameModal>
      )}
      {scene === 'game:dice' && (
        <GameModal title="Bones" onClose={() => setScene('hub')}>
          <Dice breath={breath} houseEdge={houseEdgeTier} dialogueStyle={settings.dialogueStyle}
            onResult={handleResult} onExit={() => setScene('hub')}/>
        </GameModal>
      )}
      {scene === 'game:coin' && (
        <GameModal title="The Coin" onClose={() => setScene('hub')}>
          <CoinFlip breath={breath} houseEdge={houseEdgeTier} dialogueStyle={settings.dialogueStyle}
            onResult={handleResult} onExit={() => setScene('hub')}/>
        </GameModal>
      )}
      {scene === 'game:baccarat' && (
        <GameModal title="Baccarat" onClose={() => setScene('hub')}>
          <Baccarat breath={breath} houseEdge={houseEdgeTier} dialogueStyle={settings.dialogueStyle}
            onResult={handleResult} onExit={() => setScene('hub')}/>
        </GameModal>
      )}
      {scene === 'game:poker' && (
        <GameModal title="Ghost Poker" onClose={() => setScene('hub')}>
          <Poker breath={breath} houseEdge={houseEdgeTier} dialogueStyle={settings.dialogueStyle}
            onResult={handleResult} onExit={() => setScene('hub')}/>
        </GameModal>
      )}

      {/* NPC dialogs over the world */}
      {activeNpc && (
        <NPCEncounter
          npcId={activeNpc}
          breath={breath}
          houseEdgeTier={houseEdgeTier}
          gamesPlayed={gamesPlayed}
          fragments={fragments}
          onClose={() => setActiveNpc(null)}
          onBuyFragment={(cost, id) => {
            // Muse can sell a random unpicked fragment for breath
            if (breath < cost) return;
            setBreath(b => b - cost);
            if (id) handleFragmentPickup(id);
          }}
          onMirrorAccept={() => { setActiveNpc(null); setScene('ending:mirror'); }}
        />
      )}

      {/* Fragment reader modal */}
      {fragmentReader && (
        <FragmentReader
          fragmentId={fragmentReader}
          onClose={() => setFragmentReader(null)}
        />
      )}

      {/* Fragment gallery — shift+F */}
      {galleryOpen && (
        <FragmentGallery
          collected={fragments}
          onClose={() => setGalleryOpen(false)}
          onPick={(id) => { setFragmentReader(id); setGalleryOpen(false); }}
        />
      )}

      {/* House edge subtle indicator (only shown when > normal) */}
      {inWorld && (houseEdgeTier === 'hard' || houseEdgeTier === 'rigged' || houseEdgeTier === 'cruel') && (
        <div className="house-edge-indicator">
          <span className="edge-label">THE HOUSE</span>
          <span className="edge-tier">{houseEdgeTier.toUpperCase()}</span>
        </div>
      )}

      {/* Mirror-unlock announcement */}
      {mirrorAnnouncement && (
        <div className="mirror-announcement">
          <div className="mirror-announcement-kind">A NEW PRESENCE</div>
          <div className="mirror-announcement-title">She is watching the pool now.</div>
          <div className="mirror-announcement-sub">A woman, dressed in your winnings.</div>
        </div>
      )}

      {/* Revelation cinematic — flash of stained glass color before the reveal */}
      {revelationCinematic && <div className="revelation-cinematic"/>}

      {/* Credits, auto or user-triggered */}
      {creditsOpen && <CreditsScroll meta={meta} onClose={() => setCreditsOpen(false)}/>}

      {/* First-time ending discovered — brief overlay */}
      {endingDiscovered && (() => {
        const card = ENDING_CARDS.find(c => c.id === endingDiscovered);
        const label = card ? card.label : endingDiscovered.toUpperCase();
        return (
          <div className="ending-discovered">
            <div className="ending-discovered-kind">ENDING DISCOVERED</div>
            <div className="ending-discovered-label">{label}</div>
          </div>
        );
      })()}

      {/* ========== 2D scenes (intro, endings, ghost, spectator) — POV-wrapped ========== */}
      {(scene === 'intro' || scene === 'ghostIntro' || scene === 'spectator' || scene.startsWith('ending:')) && (
        <POVContent lowBreath={lowBreath}>
          {scene === 'intro' && (
            <div data-screen-label="01 Intro">
              <Intro
                dialogueStyle={settings.dialogueStyle}
                onStart={() => {
                  setBreath(settings.startingBreath);
                  setGamesPlayed(0);
                  setMeta(m => {
                    const next = { ...m, totalRuns: m.totalRuns + 1 };
                    saveMeta(next);
                    runIdxRef.current = next.totalRuns;
                    return next;
                  });
                  appendLedger({ runIdx: runIdxRef.current || 1, kind: 'run', text: 'descent begins' });
                  setScene('hub');
                  setWhisper(pickLine('greet', settings.dialogueStyle));
                  setTimeout(() => setWhisper(null), 8000);
                }}
              />
            </div>
          )}

          {scene === 'ghostIntro' && (
            <div data-screen-label="Ghost Intro">
              <GhostIntro
                meta={meta}
                onBeginNewRun={beginNewRun}
                onSpectate={() => setScene('spectator')}
              />
            </div>
          )}

          {scene === 'spectator' && (
            <div data-screen-label="Spectator">
              <SpectatorScreen onReturn={() => setScene('ghostIntro')}/>
            </div>
          )}

          {scene === 'ending:escape' && (
            <div data-screen-label="Ending Escape">
              <EndingBackdrop kind="escape"/>
              <Ending kind="escape" breath={breath} gamesPlayed={gamesPlayed} onRestart={restart}/>
            </div>
          )}
          {scene === 'ending:drown' && (
            <div data-screen-label="Ending Drown">
              <EndingBackdrop kind="drown"/>
              <Ending kind="drown" breath={breath} gamesPlayed={gamesPlayed} onRestart={restart}/>
            </div>
          )}
          {scene === 'ending:house' && (
            <div data-screen-label="Ending House">
              <EndingBackdrop kind="house"/>
              <Ending kind="house" breath={breath} gamesPlayed={gamesPlayed} onRestart={restart}/>
            </div>
          )}
          {scene === 'ending:revelation' && (
            <div data-screen-label="Ending Revelation">
              <EndingBackdrop kind="revelation"/>
              <RevelationEnding
                breath={breath}
                gamesPlayed={gamesPlayed}
                fragmentCount={fragments.length}
                onRestart={() => { clearFragments(); restart(); }}
              />
            </div>
          )}
          {scene === 'ending:mirror' && (
            <div data-screen-label="Ending Mirror">
              <EndingBackdrop kind="mirror"/>
              <MirrorEnding
                breath={breath}
                gamesPlayed={gamesPlayed}
                onRestart={() => { clearFragments(); restart(); }}
              />
            </div>
          )}
          {scene === 'ending:sovereign' && (
            <div data-screen-label="Ending Sovereign">
              <EndingBackdrop kind="sovereign"/>
              <SovereignEnding
                breath={breath}
                gamesPlayed={gamesPlayed}
                onRestart={() => { clearFragments(); setLockedIn(false); restart(); }}
              />
            </div>
          )}
          {scene === 'ending:walkAway' && (
            <div data-screen-label="Ending Walk Away">
              <EndingBackdrop kind="walkAway"/>
              <Ending kind="walkAway" breath={breath} gamesPlayed={gamesPlayed} onRestart={restart}/>
            </div>
          )}
        </POVContent>
      )}

      {/* Film-grain overlay for cinematic texture */}
      <div className="film-grain"/>

      {/* Goggles vignette, chromatic blur, debris, fog, bubbles, panic vignette */}
      <POVLayer lowBreath={lowBreath}/>

      {/* HUD sits above the POV overlays so it stays sharp and readable */}
      {inWorld && (
        <BreathHUD breath={breath} max={TARGET_BREATH} depth={depthNum}/>
      )}

      <TweaksPanel visible={tweaksVisible} settings={settings} setSettings={setSettings}/>

      {/* Restart button in top right when in hub/game */}
      {inWorld && (
        <button
          className="btn btn-ghost btn-sm"
          onClick={() => { if (confirm("Return to the surface? Your progress will be lost.")) restart(); }}
          style={{position:'fixed', top: 20, right: 180, zIndex: 111}}>
          Restart
        </button>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>


<script>
(function(){
  function run(){
    const scripts = document.querySelectorAll('script[type="text/plain"][data-babel]');
    for (const s of scripts) {
      try {
        const out = Babel.transform(s.textContent, {presets: ['react']}).code;
        (0, eval)(out);
      } catch (e) {
        console.error('Babel error in', s.dataset.babel, e);
        document.getElementById('root').innerHTML = '<pre style="color:#ff6b8a;padding:40px;font-family:monospace;white-space:pre-wrap">' + s.dataset.babel + ': ' + (e.message || e) + '</pre>';
        return;
      }
    }
  }
  if (typeof Babel !== 'undefined') run();
  else window.addEventListener('load', run);
})();
</script>

</body>
</html>
