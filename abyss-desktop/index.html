<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="dark"/>
  <title>Abyss</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cormorant+Upright:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --abyss:       #050308;
      --bone:        #e8ddbc;
      --bone-dim:    #a89972;
      --blood:       #7a1420;
      --gold:        #c49a4a;
      --gold-dark:   #6d5220;
      --siren:       #8a5fb0;
      --siren-dark:  #513a6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--abyss);
      color: var(--bone);
      font-family: 'Cormorant Upright', Georgia, serif;
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }
    #app { height: 100%; position: relative; }
    #game { display: block; width: 100%; height: 100%; }
    /* Boot splash — gets removed once the engine is up. */
    #boot {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 28px;
      background: radial-gradient(ellipse 70% 50% at 50% 50%, #0a0612, #050308 70%);
      transition: opacity 0.45s ease-out;
    }
    #boot.done { opacity: 0; pointer-events: none; }
    #boot .title {
      font-family: 'UnifrakturMaguntia', 'UnifrakturCook', serif;
      font-size: clamp(68px, 10vw, 128px);
      letter-spacing: 0.06em;
      color: var(--bone);
      text-shadow: 0 0 40px rgba(196, 154, 74, 0.25);
    }
    #boot .sub {
      font-style: italic;
      color: var(--bone-dim);
      font-size: clamp(12px, 1.2vw, 16px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="boot">
    <div class="title">Abyss</div>
    <div class="sub">descending</div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
