; Mac-specific runtime settings applied on top of DefaultEngine.ini.
; Anything here only runs on Mac builds.

[/Script/Engine.RendererSettings]
; Render-thread pipelining — pulls another frame of parallelism out of
; the M4 Max's 16 cores (12 performance + 4 efficiency).
r.OneFrameThreadLag=1

; Shader pipeline cache — cold-launch precompiles all shaders once,
; then caches them on disk. Second-launch startup is near-instant.
r.ShaderPipelineCache.Enabled=1
r.ShaderPipelineCache.StartupMode=1
r.ShaderPipelineCache.AlwaysGenerateOSCache=1
r.ShaderPipelineCache.SaveBoundPSOLog=0

[SystemSettings]
; ProMotion — lift the render-rate ceiling to 120 fps when the panel supports
; it. UE uses the OS-reported max refresh for the displayed monitor.
rhi.SyncInterval=0
t.MaxFPS=0

; When in battery-saver / Low Power Mode, macOS throttles GPU. We let it
; happen; disabling these means the game won't hit 120 fps on battery but
; also won't drain the battery in 40 minutes.
rhi.SyncAllowEarlyKick=1

[/Script/MacTargetPlatform.MacTargetSettings]
; IndirectArgumentBuffers + unified-memory paths enabled in DefaultEngine.ini.
; Metal command-buffer count — more in flight = higher throughput on M-series.
MetalCommandBufferCount=4

[Core.Log]
; Keep Metal validation quiet in shipping.
LogMetal=NoLogging
LogRHI=Warning
