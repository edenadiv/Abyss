[/Script/Engine.RendererSettings]
; --- Lumen: software ray tracing only (Apple Silicon has no HW-RT).
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.Reflections.Allow=1
r.Lumen.HardwareRayTracing=0
r.Lumen.ScreenProbeGather.ScreenTraces=1
r.Lumen.ScreenProbeGather.FullResolutionJitterWidth=0.5
r.Lumen.Reflections.MaxRoughnessToTrace=0.4
r.Lumen.Reflections.MaxRoughnessToTraceClamp=0.4
r.Lumen.TranslucencyVolume.GridPixelSize=64
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1
; --- Shadows: Virtual Shadow Maps are vastly cheaper than cube maps.
r.Shadow.Virtual.Enable=1
r.Shadow.Virtual.ResolutionLodBiasDirectional=-1
r.Shadow.Virtual.ResolutionLodBiasLocal=0
; --- Nanite: unified-memory M4 Max can chew through huge cluster budgets.
r.Nanite.ProjectEnabled=1
r.Nanite.MaxCandidateClusters=33554432
r.Nanite.MaxVisibleClusters=4194304
r.Nanite.MaxNodes=4194304
; --- Post-processing defaults.
r.DefaultFeature.AutoExposure=1
r.DefaultFeature.AutoExposure.Method=1
r.DefaultFeature.MotionBlur=1
r.DefaultFeature.Bloom=1
r.DefaultFeature.AmbientOcclusion=1
r.DefaultFeature.AmbientOcclusionStaticFraction=1
; --- Anti-aliasing: TSR (Temporal Super Resolution) — UE5's upscaler.
;     Works great with MetalFX. Beats FXAA/MSAA on Apple Silicon.
r.AntiAliasingMethod=4
r.TemporalAA.Upsampling=1
r.TSR.History.ScreenPercentage=100
r.TSR.ShadingRejection.Flickering=1
; --- Texture streaming — M4 Max 128 GB unified memory means we can
;     bank a 4 GB texture pool without worry. Default is 1000 MB.
r.Streaming.PoolSize=4096
r.Streaming.MaxNumTexturesToStreamPerFrame=64
; --- Generator speed.
r.GenerateMeshDistanceFields=1
r.Mobile.DisableVulkanSupport=1
r.SkinCache.CompileShaders=1
r.SupportSkyAtmosphere=1
r.SupportSkyAtmosphereAffectsHeightFog=1
; --- MetalFX upscaling — Apple's DLSS analog. UE 5.3+ supports it.
r.Mac.MetalFX.EnableTemporalUpscaling=1
r.Mac.MetalFX.EnableSpatialUpscaling=1
; --- Remove MSAA (incompatible with deferred + Lumen anyway).
r.MSAA.CompositingSampleCount=4

