; Scalability groups — one per quality preset. Low/Medium/High/Ultra +
; Cinematic mirror the Settings widget in the game. UE applies the
; current group's CVars at runtime.

;================================
; AntiAliasing
;================================
[AntiAliasingQuality@0]
r.AntiAliasingMethod=1
r.PostProcessAAQuality=0
[AntiAliasingQuality@1]
r.AntiAliasingMethod=4
r.PostProcessAAQuality=3
[AntiAliasingQuality@2]
r.AntiAliasingMethod=4
r.PostProcessAAQuality=4
[AntiAliasingQuality@3]
r.AntiAliasingMethod=4
r.PostProcessAAQuality=5
[AntiAliasingQuality@Cine]
r.AntiAliasingMethod=4
r.PostProcessAAQuality=6

;================================
; ViewDistance
;================================
[ViewDistanceQuality@0]
r.SkeletalMeshLODBias=2
r.ViewDistanceScale=0.4
[ViewDistanceQuality@1]
r.SkeletalMeshLODBias=1
r.ViewDistanceScale=0.6
[ViewDistanceQuality@2]
r.SkeletalMeshLODBias=0
r.ViewDistanceScale=1.0
[ViewDistanceQuality@3]
r.SkeletalMeshLODBias=0
r.ViewDistanceScale=1.2
[ViewDistanceQuality@Cine]
r.SkeletalMeshLODBias=0
r.ViewDistanceScale=10.0

;================================
; GlobalIllumination (Lumen)
;================================
[GlobalIlluminationQuality@0]
r.DynamicGlobalIlluminationMethod=0
[GlobalIlluminationQuality@1]
r.DynamicGlobalIlluminationMethod=1
r.Lumen.DiffuseIndirect.Allow=1
r.LumenScene.SurfaceCache.AtlasSize=1024
r.Lumen.ScreenProbeGather.DownsampleFactor=32
r.Lumen.ScreenProbeGather.TracingOctahedronResolution=4
[GlobalIlluminationQuality@2]
r.DynamicGlobalIlluminationMethod=1
r.LumenScene.SurfaceCache.AtlasSize=2048
r.Lumen.ScreenProbeGather.DownsampleFactor=16
r.Lumen.ScreenProbeGather.TracingOctahedronResolution=8
[GlobalIlluminationQuality@3]
r.DynamicGlobalIlluminationMethod=1
r.LumenScene.SurfaceCache.AtlasSize=4096
r.Lumen.ScreenProbeGather.DownsampleFactor=8
r.Lumen.ScreenProbeGather.TracingOctahedronResolution=16
[GlobalIlluminationQuality@Cine]
r.DynamicGlobalIlluminationMethod=1
r.LumenScene.SurfaceCache.AtlasSize=8192
r.Lumen.ScreenProbeGather.DownsampleFactor=8
r.Lumen.ScreenProbeGather.TracingOctahedronResolution=32

;================================
; Reflections (Lumen)
;================================
[ReflectionQuality@0]
r.Lumen.Reflections.Allow=0
[ReflectionQuality@1]
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.DownsampleFactor=2
[ReflectionQuality@2]
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.DownsampleFactor=1
[ReflectionQuality@3]
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.DownsampleFactor=1
r.Lumen.Reflections.ScreenSpaceReconstruction.SampleCount=32
[ReflectionQuality@Cine]
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.DownsampleFactor=1

;================================
; Shadows (Virtual Shadow Maps)
;================================
[ShadowQuality@0]
r.ShadowQuality=2
r.Shadow.Virtual.ResolutionLodBiasDirectional=2.0
[ShadowQuality@1]
r.ShadowQuality=3
r.Shadow.Virtual.ResolutionLodBiasDirectional=1.0
[ShadowQuality@2]
r.ShadowQuality=5
r.Shadow.Virtual.ResolutionLodBiasDirectional=0.0
[ShadowQuality@3]
r.ShadowQuality=5
r.Shadow.Virtual.ResolutionLodBiasDirectional=-1.0
[ShadowQuality@Cine]
r.ShadowQuality=5
r.Shadow.Virtual.ResolutionLodBiasDirectional=-2.0

;================================
; PostProcess
;================================
[PostProcessQuality@0]
r.MotionBlurQuality=0
r.BloomQuality=3
r.DepthOfFieldQuality=0
[PostProcessQuality@1]
r.MotionBlurQuality=2
r.BloomQuality=4
r.DepthOfFieldQuality=1
[PostProcessQuality@2]
r.MotionBlurQuality=3
r.BloomQuality=5
r.DepthOfFieldQuality=2
[PostProcessQuality@3]
r.MotionBlurQuality=4
r.BloomQuality=5
r.DepthOfFieldQuality=3
[PostProcessQuality@Cine]
r.MotionBlurQuality=4
r.BloomQuality=5
r.DepthOfFieldQuality=4

;================================
; Textures
;================================
[TextureQuality@0]
r.Streaming.MipBias=2
[TextureQuality@1]
r.Streaming.MipBias=1
[TextureQuality@2]
r.Streaming.MipBias=0
[TextureQuality@3]
r.Streaming.MipBias=0
[TextureQuality@Cine]
r.Streaming.MipBias=0

;================================
; Effects
;================================
[EffectsQuality@0]
r.TranslucencyLightingVolumeDim=24
[EffectsQuality@1]
r.TranslucencyLightingVolumeDim=32
[EffectsQuality@2]
r.TranslucencyLightingVolumeDim=48
[EffectsQuality@3]
r.TranslucencyLightingVolumeDim=64
[EffectsQuality@Cine]
r.TranslucencyLightingVolumeDim=64

;================================
; Foliage
;================================
[FoliageQuality@0]
foliage.DensityScale=0
[FoliageQuality@1]
foliage.DensityScale=0.5
[FoliageQuality@2]
foliage.DensityScale=1.0
[FoliageQuality@3]
foliage.DensityScale=1.0
[FoliageQuality@Cine]
foliage.DensityScale=1.0

;================================
; Scalability master — the defaults when user hasn't picked a preset
; Cinematic on M4 Max means the ≥120 fps target is probably safe for
; our geometry budget.
;================================
[ScalabilitySettings]
PerfIndexValues_ResolutionQuality="50 75 100 100 100"
PerfIndexValues_ViewDistanceQuality="0 1 2 3 3"
PerfIndexValues_AntiAliasingQuality="0 1 2 3 3"
PerfIndexValues_ShadowQuality="0 1 2 3 3"
PerfIndexValues_GlobalIlluminationQuality="0 1 2 3 3"
PerfIndexValues_ReflectionQuality="0 1 2 3 3"
PerfIndexValues_PostProcessQuality="0 1 2 3 3"
PerfIndexValues_TextureQuality="0 1 2 3 3"
PerfIndexValues_EffectsQuality="0 1 2 3 3"
PerfIndexValues_FoliageQuality="0 1 2 3 3"
PerfIndexValues_ShadingQuality="0 1 2 3 3"
